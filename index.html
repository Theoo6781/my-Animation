<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cyber UI Animation</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #0f172a;
            font-family: monospace;
            color: #00ffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GRID BACKGROUND */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background:
                linear-gradient(#00ffff22 1px, transparent 1px),
                linear-gradient(90deg, #00ffff22 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 10s linear infinite;
        }

        @keyframes gridMove {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-50px, -50px);
            }
        }

        /* SCAN LINE */
        .scan {
            position: absolute;
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, transparent, #00ffff, transparent);
            animation: scanMove 3s linear infinite;
        }

        @keyframes scanMove {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        /* GLITCH TEXT */
        .glitch {
            position: relative;
            font-size: 40px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: flicker 2s infinite alternate;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
        }

        .glitch::before {
            color: #ff00ff;
            animation: glitch1 0.5s infinite;
        }

        .glitch::after {
            color: #00ff00;
            animation: glitch2 0.5s infinite;
        }

        @keyframes glitch1 {
            0% {
                transform: translate(2px, 0);
            }

            50% {
                transform: translate(-2px, 0);
            }

            100% {
                transform: translate(2px, 0);
            }
        }

        @keyframes glitch2 {
            0% {
                transform: translate(-2px, 0);
            }

            50% {
                transform: translate(2px, 0);
            }

            100% {
                transform: translate(-2px, 0);
            }
        }

        @keyframes flicker {
            from {
                opacity: 0.8;
            }

            to {
                opacity: 1;
            }
        }

        /* FLOATING PARTICLES */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00ffff;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh);
            }

            to {
                transform: translateY(-10vh);
            }
        }
    </style>
</head>

<body>

    <div class="scan"></div>

    <h1 class="glitch" data-text="SYSTEM ONLINE">
        SYSTEM ONLINE
    </h1>

    <script>
        // Create digital particles
        for (let i = 0; i < 50; i++) {
            let p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (3 + Math.random() * 5) + "s";
            document.body.appendChild(p);
        }
    </script>

</body>

</html>
